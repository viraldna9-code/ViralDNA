name: ViralDNA Spike Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  spike-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv feedparser praw 2>&1 | tail -5

      - name: Run spike monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor_cloud.py

      - name: Commit topics file back to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ViralDNA Bot"
          git config user.email "bot@viraldna.local"
          git add logs/topics_history.json logs/audit_warnings.log 2>/dev/null || true
          # Commit only if file actually changed
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update topics [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Push using token in URL (fixes shallow clone push issues)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --unshallow 2>/dev/null || true
          git push origin main 2>&1
