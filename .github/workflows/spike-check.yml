name: ViralDNA Spike Check (Telegram Alert Only)
# Runs every 60 minutes (within GitHub Actions 2000 min/month free tier)
# Spike detection → Telegram alert only. Does NOT trigger production.

on:
  schedule:
    # Every hour at :00 UTC
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  spike-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Spike check should be fast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('modules/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install --quiet -r modules/requirements.txt

      - name: Write credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          mkdir -p /home/runner/ViralDNA/credentials
          echo "$YOUTUBE_CLIENT_SECRETS" > /home/runner/ViralDNA/credentials/client_secrets.json
          echo "$YOUTUBE_TOKEN" > /home/runner/ViralDNA/credentials/youtube_token.json

      - name: Initialize ViralDNA directories
        run: |
          mkdir -p /home/runner/ViralDNA/{cache,audio,videos,thumbnails,output/runtime}

      - name: Run spike detection
        env:
          DRIVE_BASE: /home/runner/ViralDNA
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 modules/run_multi_agent_pipeline.py --mode spike_check
